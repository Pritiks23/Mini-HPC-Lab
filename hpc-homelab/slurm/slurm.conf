# =========================================================
# slurm.conf — HPC Homelab cluster configuration
# Demonstrates: partitions, fairshare, preemption, backfill
# =========================================================

ClusterName=homelab
SlurmctldHost=slurmctld
SlurmUser=slurm
SlurmctldPort=6817
SlurmdPort=6818
AuthType=auth/munge
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SwitchType=switch/none
MpiDefault=none
SlurmctldPidFile=/var/run/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid
ProctrackType=proctrack/pgid
ReturnToService=1

# --- Scheduling ---
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory
PriorityType=priority/multifactor
PriorityWeightAge=1000
PriorityWeightFairshare=10000
PriorityWeightJobSize=1000
PriorityWeightPartition=5000
PriorityWeightQOS=2000
PriorityDecayHalfLife=1-0
PriorityMaxAge=7-0

# --- Preemption ---
PreemptType=preempt/qos
PreemptMode=REQUEUE
PreemptExemptTime=0

# --- Accounting ---
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=slurmdbd
AccountingStorageUser=slurm
AccountingStoragePass=slurmpass
JobAcctGatherType=jobacct_gather/linux
JobAcctGatherFrequency=30

# --- Nodes ---
# CPUs=2 matches Docker container CPU allocation
NodeName=node[01-03] CPUs=2 RealMemory=2000 State=UNKNOWN

# --- Partitions ---
# debug: short jobs, high priority, for testing
PartitionName=debug   Nodes=node[01-02] Default=NO  MaxTime=00:30:00 Priority=100 State=UP
# general: normal research workloads
PartitionName=general Nodes=node[01-03] Default=YES MaxTime=24:00:00 Priority=50  State=UP
# high-mem: reserved for memory-intensive jobs (node03)
PartitionName=high-mem Nodes=node03      Default=NO  MaxTime=48:00:00 Priority=75  State=UP
