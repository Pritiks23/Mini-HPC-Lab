# =========================================================
# slurmdbd.conf — Slurm accounting database daemon config
# Connects Slurm to MariaDB for job history + fairshare
# =========================================================

ArchiveEvents=yes
ArchiveJobs=yes
ArchiveResvs=yes
ArchiveSteps=no
ArchiveSuspend=no
ArchiveTXN=no
ArchiveUsage=no

AuthType=auth/munge
DbdHost=slurmdbd
DbdPort=6819

DebugLevel=info
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/var/run/slurmdbd.pid

SlurmUser=slurm

StorageType=accounting_storage/mysql
StorageHost=mariadb
StoragePort=3306
StorageUser=slurm
StoragePass=slurmpass
StorageLoc=slurm_acct_db

# Purge detailed step records after 1 month; keep job records 1 year
PurgeEventAfter=1month
PurgeJobAfter=12months
PurgeResvAfter=1month
PurgeStepAfter=1month
PurgeSuspendAfter=1month
PurgeTXNAfter=12months
PurgeUsageAfter=24months
