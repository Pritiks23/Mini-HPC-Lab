# =========================================================
# sshd_hardening.conf — drop-in SSH security hardening
# Place at: /etc/ssh/sshd_config.d/99-hpc-hardening.conf
# Applied by: ansible/playbooks/hardening.yml
# =========================================================

# Disable direct root login — admins sudo after login
PermitRootLogin no

# Key-based auth only — no passwords over the wire
PasswordAuthentication no
ChallengeResponseAuthentication no
PermitEmptyPasswords no

# Restrict to the hpcusers group (researchers + admins)
AllowGroups hpcusers wheel

# Limit brute-force surface
MaxAuthTries 3
MaxSessions 10
LoginGraceTime 30

# Disable legacy/weak features
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitUserEnvironment no

# Use only modern ciphers, MACs, and key exchange algorithms
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512

# Log at VERBOSE so key fingerprints appear in auth.log
LogLevel VERBOSE
