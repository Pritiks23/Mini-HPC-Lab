---
- name: Configure Slurm controller
  hosts: slurm_controller
  become: true
  roles:
    - role: slurm_controller
  vars:
    slurm_cluster_name: homelab
    slurm_state_save_location: /var/spool/slurmctld
    slurm_db_host: mariadb
    slurm_db_user: slurm
    slurm_db_pass: slurmpass

- name: Configure Slurm compute nodes
  hosts: compute
  become: true
  roles:
    - role: slurm_compute
  vars:
    slurm_controller_host: slurmctld

- name: Bootstrap accounts and QoS
  hosts: slurm_controller
  become: true
  tasks:
    - name: Copy QoS bootstrap script
      copy:
        src: ../../slurm/qos_fairshare.sh
        dest: /tmp/qos_fairshare.sh
        mode: "0755"

    - name: Run QoS bootstrap (idempotent)
      command: /tmp/qos_fairshare.sh
      changed_when: false
