---
- name: Apply CIS hardening to all nodes
  hosts: all
  become: true

  handlers:
    - name: Restart sshd
      service:
        name: sshd
        state: restarted

    - name: Restart auditd
      service:
        name: auditd
        state: restarted

  tasks:
    - name: Install security packages
      package:
        name:
          - auditd
          - audispd-plugins
          - unattended-upgrades
          - fail2ban
          - aide
        state: present

    - name: Deploy hardened sshd config
      copy:
        src: ../../security/sshd_hardening.conf
        dest: /etc/ssh/sshd_config.d/99-hpc-hardening.conf
        mode: "0600"
        owner: root
        group: root
      notify: Restart sshd

    - name: Deploy audit rules
      copy:
        src: ../../security/audit.rules
        dest: /etc/audit/rules.d/hpc.rules
        mode: "0640"
        owner: root
        group: root
      notify: Restart auditd

    - name: Enable unattended security upgrades
      copy:
        content: |
          Unattended-Upgrade::Allowed-Origins {
            "${distro_id}:${distro_codename}-security";
          };
          Unattended-Upgrade::Automatic-Reboot "false";
          Unattended-Upgrade::Mail "root";
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: "0644"

    - name: Set login banner (compliance)
      copy:
        content: |
          ********************************************************************
          * Authorized use only. All activity is monitored and logged.       *
          * Unauthorized access is prohibited and subject to prosecution.    *
          ********************************************************************
        dest: /etc/motd
        mode: "0644"

    - name: Disable unused filesystems (CIS 1.1)
      copy:
        content: |
          install cramfs /bin/true
          install freevxfs /bin/true
          install jffs2 /bin/true
          install hfs /bin/true
          install hfsplus /bin/true
          install squashfs /bin/true
          install udf /bin/true
        dest: /etc/modprobe.d/hpc-disable-fs.conf
        mode: "0644"
