version: "3.9"

networks:
  hpcnet:
    driver: bridge

volumes:
  home_vol:
  scratch_vol:
  slurm_state:

services:

  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: slurmdbpass
      MYSQL_DATABASE: slurm_acct_db
      MYSQL_USER: slurm
      MYSQL_PASSWORD: slurmpass
    volumes:
      - slurm_state:/var/lib/mysql
    networks:
      hpcnet:
        aliases: [mariadb]
    restart: unless-stopped

  slurmctld:
    image: ghcr.io/giovtorres/slurm-docker-cluster:23.11
    hostname: slurmctld
    container_name: slurmctld
    command: slurmctld
    volumes:
      - ./slurm/slurm.conf:/etc/slurm/slurm.conf:ro
      - ./slurm/slurmdbd.conf:/etc/slurm/slurmdbd.conf:ro
      - home_vol:/home
      - scratch_vol:/scratch
    networks:
      hpcnet:
        aliases: [slurmctld]
    depends_on: [mariadb, slurmdbd]
    restart: unless-stopped

  slurmdbd:
    image: ghcr.io/giovtorres/slurm-docker-cluster:23.11
    hostname: slurmdbd
    container_name: slurmdbd
    command: slurmdbd
    volumes:
      - ./slurm/slurmdbd.conf:/etc/slurm/slurmdbd.conf:ro
    networks:
      hpcnet:
        aliases: [slurmdbd]
    depends_on: [mariadb]
    restart: unless-stopped

  node01:
    image: ghcr.io/giovtorres/slurm-docker-cluster:23.11
    hostname: node01
    container_name: node01
    command: slurmd
    volumes:
      - ./slurm/slurm.conf:/etc/slurm/slurm.conf:ro
      - home_vol:/home
      - scratch_vol:/scratch
    networks:
      hpcnet:
        aliases: [node01]
    depends_on: [slurmctld]
    restart: unless-stopped

  node02:
    image: ghcr.io/giovtorres/slurm-docker-cluster:23.11
    hostname: node02
    container_name: node02
    command: slurmd
    volumes:
      - ./slurm/slurm.conf:/etc/slurm/slurm.conf:ro
      - home_vol:/home
      - scratch_vol:/scratch
    networks:
      hpcnet:
        aliases: [node02]
    depends_on: [slurmctld]
    restart: unless-stopped

  node03:
    image: ghcr.io/giovtorres/slurm-docker-cluster:23.11
    hostname: node03
    container_name: node03
    command: slurmd
    volumes:
      - ./slurm/slurm.conf:/etc/slurm/slurm.conf:ro
      - home_vol:/home
      - scratch_vol:/scratch
    networks:
      hpcnet:
        aliases: [node03]
    depends_on: [slurmctld]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    hostname: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
    ports:
      - "9090:9090"
    networks: [hpcnet]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks: [hpcnet]
    restart: unless-stopped
